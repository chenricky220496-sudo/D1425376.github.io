<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘星空運勢占卜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 畫布用於背景特效，增加神祕感 -->
        <canvas id="bgCanvas"></canvas>
        
        <div class="card" id="mainCard">
            <h1 class="title">✨ 神秘星空運勢占卜 ✨</h1>
            <p class="intro">想知道近期的運勢如何嗎？集中精神，點擊下方按鈕，讓星空為你指引未來的方向！</p>
            
            <!-- 占卜區 -->
            <div id="actionArea">
                <button id="drawBtn" class="btn primary-btn">🔮 開始占卜</button>
            </div>

            <!-- 結果區 -->
            <div id="resultArea" class="hidden">
                <div class="result-box">
                    <h2 id="fortuneType" class="fortune-type"></h2>
                    <p id="fortuneDesc" class="fortune-desc"></p>
                    <p id="fortuneClosing" class="fortune-closing"></p>
                </div>
                <button id="resetBtn" class="btn secondary-btn">🔄 再占卜一次</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
